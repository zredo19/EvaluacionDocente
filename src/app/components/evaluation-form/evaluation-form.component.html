<div class="card" *ngIf="course">
  <div class="card-header bg-primary text-white">
    <h3>Evaluar Curso: {{course.name}}</h3>
  </div>
  <div class="card-body">
    <div class="alert alert-danger" *ngIf="errorMessage">
      {{errorMessage}}
    </div>

    <div class="mb-3">
      <label class="form-label">Calificación (1-7)</label>
      <input type="number" class="form-control" min="1" max="7" [(ngModel)]="rating">
      <div class="form-text">1 es la peor calificación, 7 es la mejor</div>
    </div>

    <div class="mb-3">
      <label class="form-label">Comentario</label>
      <textarea class="form-control" rows="5" [(ngModel)]="comment"></textarea>
      <div class="form-text">Describe tu experiencia en este curso</div>
    </div>

    <div class="d-flex justify-content-between">
      <button class="btn btn-secondary" (click)="router.navigate(['/courses'])">Cancelar</button>
      <button class="btn btn-primary" (click)="submitEvaluation()">Enviar Evaluación</button>
    </div>
  </div>
</div>
