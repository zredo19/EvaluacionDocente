<div class="table-responsive">
  <table class="table table-striped table-hover">
    <thead>
      <tr>
        <th>Código</th>
        <th>Nombre</th>
        <th>Docente</th>
        <th>Carrera</th>
        <th>Semestre</th>
        <th>Evaluación Promedio</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let course of courses">
        <td>{{course.code}}</td>
        <td>{{course.name}}</td>
        <td>{{getTeacherName(course.teacher)}}</td>
        <td>{{course.career}}</td>
        <td>{{course.semester}}</td>
        <td>
          <span class="badge bg-primary rounded-pill">
            {{getCourseAverage(course.id) | number:'1.1-1'}}
          </span>
        </td>
        <td>
          <button class="btn btn-sm btn-success" (click)="navigateToEvaluation(course.id)">
            Evaluar
          </button>
        </td>
      </tr>
    </tbody>
  </table>
</div>
